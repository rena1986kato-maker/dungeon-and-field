<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダンジョンと畑のあいだで - エピソード一覧</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- 1. 外部のデータファイルを先に読み込む -->
  <script src="./js/stories-data.js"></script>
</head>
<body class="list-page">
  <div class="container">
    <h1>ダンジョンと畑のあいだで</h1>
    <ul id="story-list" class="story-list"></ul>
  </div>

  <script>
    // 2. HTMLの骨組みがブラウザに読み込まれてから安全に実行する
    window.addEventListener('DOMContentLoaded', () => {
      const listContainer = document.getElementById('story-list');
      const stories = window.STORIES_DATA; // 外部ファイルから渡ってきたデータ
      
      if (!listContainer || !stories) {
        console.error("データまたは表示領域が見つかりません");
        return;
      }
      
      // データにある分だけループしてカードを生成（今は第1話のみ）
      Object.keys(stories).forEach(id => {
        const story = stories[id];
        const li = document.createElement('li');
        li.className = 'story-item';
        li.innerHTML = `
          <a href="viewer.html?id=${id}" class="story-title">${story.title}</a>
          <p class="story-synopsis">${story.synopsis}</p>
        `;
        listContainer.appendChild(li);
      });
    });
  </script>
</body>
</html>
