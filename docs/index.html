<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダンジョンと畑のあいだで - エピソード一覧</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- 軽量な一覧データのみを読み込む -->
  <script src="./js/story-list.js"></script>
</head>
<body class="list-page">
  <div class="container">
    <h1>ダンジョンと畑のあいだで</h1>
    <ul id="story-list" class="story-list"></ul>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const listContainer = document.getElementById('story-list');
      const stories = window.STORY_LIST; // 読み込むオブジェクト名を変更
      
      if (!listContainer || !stories) return;
      
      Object.keys(stories).forEach(id => {
        const story = stories[id];
        const li = document.createElement('li');
        li.className = 'story-item';
        li.innerHTML = `
          <a href="viewer.html?id=${id}" class="story-title">${story.title}</a>
          <p class="story-synopsis">${story.synopsis}</p>
        `;
        listContainer.appendChild(li);
      });
    });
  </script>
</body>
</html>
