<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ダンジョンと畑のあいだで</title>
    <style>
        :root {
            --bg-color: #f9f9f9;
            --text-color: #333;
            --container-bg: #fff;
            --border-color: #ddd;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a1a1a;
                --text-color: #dddddd;
                --container-bg: #2d2d2d;
                --border-color: #444;
            }
        }
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            line-height: 1.8;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: var(--container-bg);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 { text-align: center; font-size: 2rem; margin-bottom: 10px; }
        h2 { border-bottom: 2px solid var(--border-color); padding-bottom: 5px; margin-top: 40px; }
        h3 { color: #555; font-size: 1.3rem; margin-top: 30px; }
        @media (prefers-color-scheme: dark) { h3 { color: #aaa; } }
        p { margin-bottom: 1.5rem; text-align: justify; }
        .toc { background: var(--bg-color); padding: 20px; border-radius: 6px; margin-bottom: 40px; }
        .toc ul { list-style: none; padding-left: 0; }
        .toc li { margin-bottom: 10px; }
        .toc a { color: #0066cc; text-decoration: none; }
        @media (prefers-color-scheme: dark) { .toc a { color: #66b2ff; } }
        .toc a:hover { text-decoration: underline; }
        hr { border: 0; border-top: 1px solid var(--border-color); margin: 40px 0; }
    </style>
</head>
<body>

    <p>湿った土を切り裂くように、クワの刃が穿つ。<br>朝露がまだ葉先に白く残る、冷たい夜明けのことだった。</p>
    <p>俺はクワを握りしめたまま、その手を止めて、遠くを見ていた……（以下、本文を流し込みます）</p>
