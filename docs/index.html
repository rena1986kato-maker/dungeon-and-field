<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダンジョンと畑のあいだで - エピソード一覧</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="list-page">
  <div class="container">
    <h1>ダンジョンと畑のあいだで</h1>
    <ul id="story-list" class="story-list"></ul>
  </div>

  <script src="js/story-list.js"></script>
  <script>
    const listContainer = document.getElementById('story-list');
    storyList.forEach(story => {
      const li = document.createElement('li');
      li.className = 'story-item';
      li.innerHTML = `
        <a href="viewer.html?id=${story.id}" class="story-title">${story.title}</a>
        <p class="story-synopsis">${story.synopsis}</p>
      `;
      listContainer.appendChild(li);
    });
  </script>
</body>
</html>
