<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダンジョンと畑のあいだで - エピソード一覧</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="./js/story-list.js"></script>
</head>
<body class="list-page">
  <div class="container">
    <h1>ダンジョンと畑のあいだで</h1>
    <ul id="story-list" class="story-list"></ul>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const listContainer = document.getElementById('story-list');
      
      // ★1. story-list.js側で定義している変数名に合わせてください
      // もしJS側が「const storyList = ...」なら、グローバル変数（window.storyList）としてアクセスできます
      const stories = window.storyList || window.STORY_LIST; 
      
      if (!listContainer || !stories) {
        console.error("一覧コンテナまたはストーリーデータが見つかりません。");
        return;
      }
      
      // ★2. 30話以上の配列データ（Array）をきれいにループ処理する標準的な書き方に変更
      stories.forEach(story => {
        const li = document.createElement('li');
        li.className = 'story-item';
        li.innerHTML = `
          <a href="viewer.html?id=${story.id}" class="story-title">${story.title}</a>
          <p class="story-synopsis">${story.synopsis}</p>
        `;
        listContainer.appendChild(li);
      });
    });
  </script>
</body>
</html>
