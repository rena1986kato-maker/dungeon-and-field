<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダンジョンと畑のあいだで - 本文ビューア</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="viewer-page">

  <div class="novel-container" id="novel-container">
    </div>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('novel-container');
      if (!container) return;

      // 1. URLから「?id=X」のパラメータを取得する（デフォルトは第1話）
      const urlParams = new URLSearchParams(window.location.search);
      const storyId = parseInt(urlParams.get('id'), 10) || 1;

      // 2. 該当する話数の本文JSファイルを動的に生成して読み込む
      const script = document.createElement('script');
      script.src = `js/stories/story${storyId}.js`;
      
      script.onload = () => {
        // JSファイルが読み込まれると、グローバル変数「storyContent」が使えるようになります
        if (!window.storyContent) {
          container.innerHTML = '<p class="error-msg">ストーリーデータの読み込みに失敗しました。</p>';
          return;
        }

        const data = window.storyContent;
        
        // 3. 本文のHTML組み立て（段落「p」を綺麗に並べる）
        let paragraphsHtml = '';
        data.paragraphs.forEach(p => {
          paragraphsHtml += `<p>${p}</p>`;
        });

        // 4. 「次の話へ進むボタン」の制御（全30話以上の運用を見据えた動的ロジック）
        // 次の話のID（現在のID + 1）
        const nextId = storyId + 1;
        let nextButtonHtml = '';
        
        // 今回は30話以上を想定しているため、ひとまず最大値を気にせずボタンを出します。
        // （もし最終話に到達した際にボタンを消したい場合は「if (nextId <= 35)」などの条件を挟んで制御します）
        nextButtonHtml = `
          <div class="next-story-wrapper">
            <a href="viewer.html?id=${nextId}" class="next-story-btn">次の一話へ</a>
          </div>
        `;

        // 5. 画面にすべてを流し込む（縦書きの世界へ！）
        container.innerHTML = `
          <div class="story-section">
            <h3 class="story-title">${data.title}</h3>
            ${paragraphsHtml}
            ${nextButtonHtml}
          </div>
        `;
      };

      script.onerror = () => {
        container.innerHTML = '<p class="error-msg">該当するエピソード（ファイル）が見つかりません。</p>';
      };

      // ドキュメントにスクリプトを差し込んでロードを開始
      document.head.appendChild(script);
    });
  </script>
</body>
</html>
