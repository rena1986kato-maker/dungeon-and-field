<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダンジョンと畑のあいだで - 本文ビューア</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="viewer-page">

  <header class="viewer-header">
    <h1 class="viewer-header-title">ダンジョンと畑のあいだで</h1>
    <a href="index.html" class="back-to-list-btn">← 一覧に戻る</a>
  </header>

  <div class="novel-container" id="novel-container">
    </div>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('novel-container');
      if (!container) return;

      // 1. URLからパラメータを取得する（デフォルトは第1話）
      const urlParams = new URLSearchParams(window.location.search);
      const storyId = parseInt(urlParams.get('id'), 10) || 1;

      // 2. 該当する話数の本文JSファイルを動的に生成して読み込む
      const script = document.createElement('script');
      script.src = `js/stories/story${storyId}.js`;
      
      script.onload = () => {
        // JSファイルが読み込まれると、グローバル変数「storyContent」が使えるようになります
        if (!window.storyContent) {
          container.innerHTML = '<p class="error-msg">ストーリーデータの読み込みに失敗しました。</p>';
          return;
        }

        const data = window.storyContent;
        
        // 3. 本文のHTML組み立て
        let paragraphsHtml = '';
        data.paragraphs.forEach(p => {
          paragraphsHtml += `<p>${p}</p>`;
        });

        // 4. 「次話へ」進むボタンの制御（文言を「次話へ」に変更）
        const nextId = storyId + 1;
        let nextButtonHtml = `
          <div class="next-story-wrapper">
            <a href="viewer.html?id=${nextId}" class="next-story-btn">次話へ</a>
          </div>
        `;

        // 5. 画面にすべてを流し込む
        container.innerHTML = `
          <div class="story-section">
            <h2 class="story-title">${data.title}</h2>
            ${paragraphsHtml}
            ${nextButtonHtml}
          </div>
        `;
      };

      script.onerror = () => {
        container.innerHTML = '<p class="error-msg">該当するエピソードが見つかりません。</p>';
      };

      // ドキュメントにスクリプトを差し込んでロードを開始
      document.head.appendChild(script);
    });
  </script>
</body>
</html>
