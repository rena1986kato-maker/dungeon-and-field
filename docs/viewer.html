<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>読み込み中... - ダンジョンと畑のあいだで</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- 1. 外部のデータファイルを先に読み込む -->
  <script src="./js/stories-data.js"></script>
</head>
<body class="viewer-page">
  <header class="viewer-header">
    <h1 id="story-title">読み込み中...</h1>
    <a href="index.html" class="back-link">一覧に戻る</a>
  </header>

  <main class="viewer-main">
    <div id="story-content" class="story-content">
      <p style="color: #888; text-align: center;">物語を読み込んでいます...</p>
    </div>
  </main>

  <footer class="viewer-footer">
    <a href="index.html" class="back-link">一覧に戻る</a>
  </footer>

  <script>
    // 2. 画面の準備が整ったら、URLのパラメータ（?id=1）に応じてデータを展開する
    window.addEventListener('DOMContentLoaded', () => {
      const titleElement = document.getElementById('story-title');
      const contentElement = document.getElementById('story-content');
      
      const urlParams = new URLSearchParams(window.location.search);
      const storyId = urlParams.get('id');
      const stories = window.STORIES_DATA;

      if (storyId && stories && stories[storyId]) {
        const story = stories[storyId];
        document.title = `${story.title} - ダンジョンと畑のあいだで`;
        titleElement.textContent = story.title;
        contentElement.innerHTML = story.content;
      } else {
        document.title = "エラー - ストーリーが見つかりません";
        titleElement.textContent = "エラー";
        contentElement.innerHTML = '<p style="color: #c00; text-align: center;">指定されたエピソードが見つかりませんでした。<br><a href="index.html">一覧に戻る</a></p>';
      }
    });
  </script>
</body>
</html>
