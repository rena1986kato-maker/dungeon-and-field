<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>読み込み中... - ダンジョンと畑のあいだで</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- タイトル等の整合性を取るために、ここでも一覧用の軽いデータを読み込んでおきます -->
  <script src="./js/story-list.js"></script>
</head>
<body class="viewer-page">
  <header class="viewer-header">
    <h1 id="story-title">読み込み中...</h1>
    <a href="index.html" class="back-link">一覧に戻る</a>
  </header>

  <main class="viewer-main">
    <div id="story-content" class="story-content">
      <p style="color: #888; text-align: center;">物語を読み込んでいます...</p>
    </div>
  </main>

  <script>
    // ページが開いた瞬間に実行
    const urlParams = new URLSearchParams(window.location.search);
    const storyId = urlParams.get('id');
    const storyInfo = window.STORY_LIST ? window.STORY_LIST[storyId] : null;

    if (storyInfo) {
      // 1. まずタイトルだけ先に表示させておく（体感速度向上）
      document.title = `${storyInfo.title} - ダンジョンと畑のあいだで`;
      
      // 2. ★超重要：該当する本文ファイル（story1.js等）を狙い撃ちで読み込むタグを作る
      const script = document.createElement('script');
      script.src = `./js/stories/story${storyId}.js`;
      
      // 3. 本文ファイルの読み込みが「完全に完了」したら、中身を画面に流し込む
      script.onload = () => {
        const titleElement = document.getElementById('story-title');
        const contentElement = document.getElementById('story-content');
        
        if (titleElement) titleElement.textContent = storyInfo.title;
        if (contentElement) contentElement.innerHTML = window.CURRENT_STORY_CONTENT;
      };
      
      // 4. 作ったタグをHTMLにドッキングして実行させる
      document.head.appendChild(script);

    } else {
      // エラー処理
      window.addEventListener('DOMContentLoaded', () => {
        document.getElementById('story-title').textContent = "エラー";
        document.getElementById('story-content').innerHTML = '<p style="color: #c00; text-align: center;">エピソードが見つかりません。</p>';
      });
    }
  </script>
</body>
</html>
